<!DOCTYPE html>
<html>
  <head>
  <title>I'adah Bazli</title>
  <style>
      body {
        margin: 0;
        text-align: center;
		background-image: linear-gradient(#fdcbf1, #e6dee9);
		background-repeat: no-repeat;
		background-attachment: fixed;
      }
	  
	  #image img {
        max-width: 70%;
		border: 5px solid grey;
		border-radius: 15px;
      }
	  
	  select {
		height: 25px;
		font-size: 15px;
		margin-top: 10px;
	  }

	  input[type="submit"] {
		height: 25px;
		font-size: 15px;
		padding: 2px 12px;
	  }
	  
    </style>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script>
	
      $(document).ready(function() {
        $("#a").change(function() {
          var selectedOption = $(this).val();
          
		  
		  if (selectedOption === "351") {
            $("#b").html("<option>Full</option><option>Part 1</option><option>Part 2</option><option>Part 3</option>");
            $("#b").prop("disabled", false);
          } else if (selectedOption === "352") {
            $("#b").html("<option>Full</option><option>Part 1</option><option>Part 2</option><option>Part 3</option>");
            $("#b").prop("disabled", false);
		  } else if (selectedOption === "353") {
            $("#b").html("<option>Full</option><option>Part 1</option><option>Part 2</option><option>Part 3</option>");
            $("#b").prop("disabled", false);
          
		  
		  } else {
            $("#b").html("<option>Select an option</option>");
            $("#b").prop("disabled", true);
          }
        });

        
		$("input[type='submit']").click(function() {
          var selectedOptionA = $("#a").val();
          var selectedOptionB = $("#b").val();
          if (selectedOptionA === "351" && selectedOptionB === "Full") {
            $("#image").html("<img src='./img/351.jpg' alt='Image 1'>");
          } else if (selectedOptionA === "351" && selectedOptionB === "Part 1") {
            $("#image").html("<img src='./img/351a.jpg' alt='Image 2'>");
		  } else if (selectedOptionA === "351" && selectedOptionB === "Part 2") {
            $("#image").html("<img src='./img/351b.jpg' alt='Image 2'>");
		  } else if (selectedOptionA === "351" && selectedOptionB === "Part 3") {
            $("#image").html("<img src='./img/351c.jpg' alt='Image 2'>");          		  
		  
		  
		  } else if (selectedOptionA === "352" && selectedOptionB === "Full") {
            $("#image").html("<img src='./img/352.jpg' alt='Image 3'>");
          } else if (selectedOptionA === "352" && selectedOptionB === "Part 1") {
            $("#image").html("<img src='./img/352a.jpg' alt='Image 4'>");
		  } else if (selectedOptionA === "352" && selectedOptionB === "Part 2") {
            $("#image").html("<img src='./img/352b.jpg' alt='Image 4'>");
		  } else if (selectedOptionA === "352" && selectedOptionB === "Part 3") {
            $("#image").html("<img src='https://drive.google.com/uc?id=1MCXJRMHNpWp0-M6vP_JLCe7W7iPdaow_' alt='Image 4'>");
       		  
			  
		  } else if (selectedOptionA === "353" && selectedOptionB === "Full") {
            $("#image").html("<img src='https://drive.google.com/uc?id=1tmdGiCf7Rqu1sKMD4J_sB5qZc30TSOG7' alt='Image 3'>");
          } else if (selectedOptionA === "353" && selectedOptionB === "Part 1") {
            $("#image").html("<img src='https://drive.google.com/uc?id=14_nsFitLUSvHkiQ2SbLm9ho-hmDlQBzH' alt='Image 4'>");
		  } else if (selectedOptionA === "353" && selectedOptionB === "Part 2") {
            $("#image").html("<img src='https://drive.google.com/uc?id=1_tkkUam01TJKacy2UGlBOvQuHTolG6F-' alt='Image 4'>");
		  } else if (selectedOptionA === "353" && selectedOptionB === "Part 3") {
            $("#image").html("<img src='https://drive.google.com/uc?id=1FpGgpsfE9SOqq6Up5FPJBaPs3_ra4I8J' alt='Image 4'>");
		  
		  } else {
            $("#image").html("");
          }
        
		});
      });
    </script>
	
  </head>
  <body>
    <select id="a">
      <option>Select Page</option>
      <option>351</option>
      <option>352</option>
	  <option>353</option>
    </select>
	
	
    <select id="b" disabled>
      <option>Select Part</option>
    </select>
	
    <br>
    <br>
    <input type="submit" value="Submit">
    <br>
    <br>
    <div id="image" class="img"></div>
  </body>
</html>
